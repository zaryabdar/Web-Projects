<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="RPS-styles.css">
  </head>
  <body>
    <p class="RPS">Rock Papaer Scissors</p>
    <button class="buttons"
      onclick="
    playgame('Rock');
    "
    >
      <img src="RPS-pictures/rock-emoji.png" alt="Rock" class="Rock-picture">
      
    </button>
    <button class="buttons"
      onclick="
      playgame('Paper');
    "
    >
    <img src="RPS-pictures/paper-emoji.png" alt="paper" class="Paper-picture">
    </button>
    <button class="buttons"
      onclick="
    playgame('Scissors');
    "
    >
      <img src="RPS-pictures/scissors-emoji.png" alt="Scissors" class="Scissors-picture">
    </button>
    <p class="js-choices"></p>
    <p class="js-result"></p>
    <p class="js-score Score-display" ></p>
    <button class="Reset-btn" onclick="
    score.wins=0;
    score.losses=0;
    score.ties=0;
    document.querySelector('.js-result').innerText=` `;
    localStorage.clear('score');
    updatescore();
    document.querySelector('.js-choices').innerHTML='';
    ">
      Reset Button
    </button>
    <button class="autoplay-btn" onclick="autoplay();">
      Auto PLay
    </button>
    <script>
      let score=JSON.parse(localStorage.getItem('score'))||{
        wins:0,
        losses:0,
        ties:0
        };
        
        function updatescore(){
        document.querySelector('.js-score').innerText=`Wins : ${score.wins}       Losses : ${score.losses}       Ties : ${score.ties}`;
        }
        updatescore();
        
        let intervalid;
        let isautoplaying=false;
        function autoplay(){
          if(!isautoplaying){ 
          intervalid = setInterval(() => {
            let playerchoice = getrandomnumber();
            playgame(playerchoice);
           },1000)
           isautoplaying=true;
           document.querySelector('.autoplay-btn').innerHTML='Stop Playing..';
          }
          else{
            clearInterval(intervalid);
            isautoplaying=false;
            document.querySelector('.autoplay-btn').innerHTML='Auto Play';
          }
        }

      function getrandomnumber() {
        const random_number = Math.random();
        let computer_choice = " ";
        if (random_number >= 0 && random_number < 1 / 3) {
          computer_choice = "Rock";
        } else if (random_number > 1 / 3 && random_number <= 2 / 3) {
          computer_choice = "Paper";
        } else if (random_number > 2 / 3 && random_number < 1) {
          computer_choice = "Scissors";
        }
        return computer_choice;
      }

      function playgame(playerchoice) {
        let computer_choice = getrandomnumber();
        let result = " ";
        if (playerchoice === "Rock") {
          if (computer_choice === "Rock") {
            result = "It's a Tie";
          } else if (computer_choice === "Paper") {
            result = "You lose";
          } else if (computer_choice === "Scissors") {
            result = "You Win";
          } 
        } else if (playerchoice === "Paper") {
          if (computer_choice === "Paper") {
            result = "It's a Tie";
          } else if (computer_choice === "Scissors") {
            result = "You lose";
          } else if (computer_choice === "Rock") {
            result = "You Win";
          }
        } else if (playerchoice === "Scissors") {
          if (computer_choice === "Scissors") {
            result = "It's a Tie";
          } else if (computer_choice === "Rock") {
            result = "You lose";
          } else if (computer_choice === "Paper") {
            result = "You Win";
          }
        }
        if(result==='You Win'){
          score.wins+=1;
        }
        else if(result==='You lose'){
          score.losses+=1;
        }
        else if(result==="It's a Tie"){
          score.ties+=1;
        }
        localStorage.setItem('score',JSON.stringify(score));
        updatescore();
        document.querySelector('.js-choices').innerText=`You choose ${playerchoice} Computer choose ${computer_choice} `;
        document.querySelector('.js-result').innerText=`${result}`;
        
      }
    </script>
  </body>
</html>

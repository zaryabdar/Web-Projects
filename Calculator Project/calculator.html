<!DOCTYPE html>
<title>Calculator</title>
<link rel="stylesheet" href="calculator.css">
<html>
  <body >
    <h1 class="main-name">Web Calculator</h1>
    <div class="calculator-box">
    <div class="display-box">
    <p class="calculator-display"></p>
    <button class="backspace-btn" onclick="backspace();">⌫</button> 
    </div>
    <p>
      <button class="calculator-btn gray-btn" onclick="
        updateCalculation('1');
      ">1</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('2');
      ">2</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('3');
      ">3</button>

      <button class="calculator-btn orange-btn" onclick="
        updateCalculation(' + ');
      ">+</button>
    </p>

    <p>
      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('4');
      ">4</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('5');
      ">5</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('6');
      ">6</button>

      <button class="calculator-btn orange-btn" onclick="
        updateCalculation(' - ');
      ">-</button>
    </p>

    <p>
      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('7');
      ">7</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('8');
      ">8</button>

      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('9');
      ">9</button>

      <button class="calculator-btn orange-btn" onclick="
        updateCalculation(' * ');
      ">*</button>
    </p>

    <p>
      <button class="calculator-btn gray-btn"  onclick="
        updateCalculation('0');
      ">0</button>

      <button class="calculator-btn orange-btn" onclick="
        updateCalculation('.');
      ">.</button>

      <button class="calculator-btn orange-btn" onclick="
        calculate();
      ">=</button>

      <button class="calculator-btn orange-btn" onclick="
        updateCalculation(' / ');
      ">/</button>
    </p>

    <p>
      <button class="calculator-btn gray-btn clear-btn" onclick="
        cleardisplay();
      ">Clear</button>
    </p>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
